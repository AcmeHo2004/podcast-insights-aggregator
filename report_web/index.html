<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buy-Side Podcast Brief</title>
  <meta name="description" content="Importance-driven buy-side podcast brief — three-pane: navigate by show/episode, exposure, or theme; scan a prioritized moment list; read full detail + clip + transcript.">
  <link rel="stylesheet" href="report.css">
</head>
<body>
  <header class="top">
    <div class="bar">
      <span class="brand">◆ Buy-Side Brief</span>
      <div class="seg sm" id="layoutseg">
        <button class="segbtn on" data-layout="triage">Triage</button>
        <button class="segbtn" data-layout="board">Board</button>
        <button class="segbtn" data-layout="reader">Reader</button>
      </div>
      <span class="meta" id="meta"></span>
      <span class="spacer"></span>
      <input class="search" id="q" type="search" placeholder="Search…" autocomplete="off">
      <button class="tbtn" id="theme-btn" title="Toggle theme">◐</button>
    </div>
    <div class="sample-banner hidden" id="sample-banner">SAMPLE — set <code>ANTHROPIC_API_KEY</code> and run the pipeline.</div>
  </header>

  <div class="app">
    <aside class="left" id="left">
      <div class="lsec">
        <div class="lk">Time</div>
        <div class="seg sm" id="dateseg">
          <button class="segbtn on" data-date="all">All</button>
          <button class="segbtn" data-date="month">30d</button>
          <button class="segbtn" data-date="week">7d</button>
        </div>
      </div>
      <div class="lsec">
        <div class="lk">Group by</div>
        <div class="seg sm" id="modeseg">
          <button class="segbtn on" data-mode="show">Show → ep</button>
          <button class="segbtn" data-mode="exposure">Exposure</button>
          <button class="segbtn" data-mode="theme">Theme</button>
        </div>
      </div>
      <div class="ltree" id="ltree"></div>
    </aside>

    <div class="splitter" data-edge="left" title="Drag to resize"></div>

    <main class="center">
      <div class="lblbar" id="lblbar"></div>
      <div class="scope-strip hidden" id="scope-strip"></div>
      <div class="list" id="list"></div>
    </main>

    <div class="splitter" data-edge="right" title="Drag to resize"></div>

    <aside class="right" id="detail">
      <button class="detail-close" id="detail-close" aria-label="Close">×</button>
      <div id="detail-body"></div>
    </aside>
  </div>

  <div class="modal-bg hidden" id="tx">
    <div class="modal">
      <div class="modal-h"><span class="modal-title" id="tx-title"></span>
        <button class="modal-x" id="tx-x" aria-label="Close">×</button></div>
      <audio id="tx-audio" controls preload="none"></audio>
      <div class="tx-note">Click any line to play from there — transcript served locally.</div>
      <div class="tx-body" id="tx-body"></div>
    </div>
  </div>

  <script src="report.js"></script>
</body>
</html>
