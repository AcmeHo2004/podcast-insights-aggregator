<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Listen — Insights Aggregator</title>
  <style>
    :root { --accent:#8a93a6; --bg:#0e1116; --surface:#161a21; --ink:#e7e9ee; --ink2:#bcc2cd; --muted:#8a93a3; --line:#262b34; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:28px;
      background: radial-gradient(1200px 600px at 50% -10%, color-mix(in srgb, var(--accent) 12%, var(--bg)), var(--bg));
      color:var(--ink); font:15px/1.6 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .player { width:min(660px,100%); background:var(--surface); border:1px solid var(--line); border-top:3px solid var(--accent);
      border-radius:14px; padding:26px 28px 24px; box-shadow:0 24px 60px rgba(0,0,0,.4); }
    .kicker { font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:color-mix(in srgb,var(--accent) 70%,var(--ink)); }
    h1 { font-size:23px; line-height:1.25; letter-spacing:-.01em; margin:8px 0 6px; }
    .meta { color:var(--muted); font-size:12.5px; margin-bottom:18px; text-transform:uppercase; letter-spacing:.04em; font-weight:500; }
    audio { width:100%; margin:4px 0 18px; }
    .notes { color:var(--ink2); font-size:14px; border-top:1px solid var(--line); padding-top:16px; margin:0; }
    .links { display:flex; gap:14px; flex-wrap:wrap; margin-top:20px; font-size:13px; }
    .links a { color:var(--muted); text-decoration:none; } .links a:hover { color:color-mix(in srgb,var(--accent) 70%,var(--ink)); }
    .err { color:var(--muted); }
  </style>
</head>
<body>
  <main class="player" id="player"><div class="err">Loading…</div></main>
  <script>
    const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const P = new URLSearchParams(location.search), id = P.get("id"), firm = P.get("firm");
    fetch("data.json").then(r => r.json()).then(items => {
      const it = items.find(x => x.id === id && (!firm || x.firm === firm));
      const el = document.getElementById("player");
      if (!it || !it.audio_url) { el.innerHTML = '<div class="err">Episode not found.</div>'; return; }
      document.title = it.title + " — " + it.source_name;
      el.style.setProperty("--accent", it.color || "#8a93a6");
      const date = (it.published_at || it.ingested_at) ? new Date(it.published_at || it.ingested_at).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}) : "";
      el.innerHTML = `
        <div class="kicker">${esc(it.firm)} · ${esc(it.source_name)}</div>
        <h1>${esc(it.title)}</h1>
        <div class="meta">Podcast${date ? " · " + esc(date) : ""}</div>
        <audio controls preload="metadata" src="${esc(it.audio_url)}"></audio>
        ${it.summary ? `<p class="notes">${esc(it.summary)}</p>` : ""}
        <div class="links"><a href="${esc(it.audio_url)}" target="_blank" rel="noopener">Open audio file</a>${it.url ? ` · <a href="${esc(it.url)}" target="_blank" rel="noopener">Episode page</a>` : ""} · <a href="index.html">← Back</a></div>`;
    }).catch(() => { document.getElementById("player").innerHTML = '<div class="err">Could not load.</div>'; });
  </script>
</body>
</html>
